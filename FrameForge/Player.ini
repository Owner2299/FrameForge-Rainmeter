; =====================================================================
; FRAMEFORGE v4.2
; =====================================================================
;
; Author      : Owner0001
; Version     : 4.2
;
; Lightweight PNG Sequence Player for Rainmeter
;
; Features:
; • PNG Alpha Transparency
; • Adjustable Scale
; • Tint Color
; • Opacity Control
; • Brightness Control
; • Dynamic Positioning
; • Custom Frame Prefix Support
; • No Plugins Required
; • No Lua Required
;
; ---------------------------------------------------------------------
; HONORABLE MENTION
; ---------------------------------------------------------------------
;
; Special thanks to Crua9 for inspiration.
;
; DeviantArt:
; https://www.deviantart.com/crua9
;
; =====================================================================

[Rainmeter]

; ---------------------------------------------------------------------
; FPS PRESETS
; ---------------------------------------------------------------------
;
; Update=100   ; 10 FPS
; Update=66    ; 15 FPS
; Update=50    ; 20 FPS
; Update=41    ; 24 FPS
; Update=33    ; 30 FPS
; Update=16    ; 60 FPS
;
; Recommended:
;
; UI Effects      → 15 FPS
; Magic Circles   → 15-24 FPS
; HUD Elements    → 24 FPS
; Smooth FX       → 30 FPS
;
; ---------------------------------------------------------------------

Update=41
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=FrameForge
Author=Owner0001
Version=4.2
Information=PNG Sequence Player for Rainmeter
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0

; =====================================================================
; QUICK START
; =====================================================================
;
; 1. Place PNG files inside:
;
;    @Resources\Frames
;
; 2. Name them:
;
;    Frame-0.png
;    Frame-1.png
;    Frame-2.png
;    ...
;
; 3. Set:
;
;    FrameCount=<Total Frames>
;
; 4. Refresh the skin.
;
; =====================================================================

[Variables]

; =====================================================================
; ANIMATION SETTINGS
; =====================================================================

; Frame prefix.
;
; Examples:
;
; FramePrefix=Frame-
; FramePrefix=Skull-
; FramePrefix=Fire-
; FramePrefix=Smoke-

FramePrefix=Frame-

; =====================================================================
; POSITION SETTINGS
; =====================================================================

; Desktop position in pixels.

PosX=0
PosY=0

; =====================================================================
; SCALE SETTINGS
; =====================================================================

; Presets:
;
; Scale=0.25    ; Quarter Size
; Scale=0.50    ; Half Size
; Scale=0.75    ; Three Quarters
; Scale=1.00    ; Original Size
; Scale=1.50    ; 150%
; Scale=2.00    ; Double Size
; Scale=4.00    ; Quad Size

Scale=0.50

; =====================================================================
; ORIGINAL FRAME SIZE
; =====================================================================
;
; Set to the resolution of a single PNG frame.
;
; Examples:
;
; 256 x 256
; 512 x 512
; 1024 x 1024
;

BaseWidth=512
BaseHeight=512

; =====================================================================
; TINT COLOR SETTINGS
; =====================================================================

; WHITE (Original)
;
; TintR=255
; TintG=255
; TintB=255

TintR=255
TintG=255
TintB=255

; Additional Color Presets
;
; RED
; TintR=255
; TintG=80
; TintB=80
;
; ORANGE
; TintR=255
; TintG=140
; TintB=40
;
; YELLOW
; TintR=255
; TintG=220
; TintB=80
;
; GREEN
; TintR=100
; TintG=255
; TintB=100
;
; CYAN
; TintR=100
; TintG=255
; TintB=255
;
; BLUE
; TintR=100
; TintG=180
; TintB=255
;
; PURPLE
; TintR=180
; TintG=100
; TintB=255
;
; PINK
; TintR=255
; TintG=120
; TintB=220
;
; GOLD
; TintR=255
; TintG=210
; TintB=80
;
; SILVER
; TintR=200
; TintG=200
; TintB=200

; =====================================================================
; OPACITY SETTINGS
; =====================================================================

; Presets:
;
; TintA=255   ; Fully Visible
; TintA=220   ; Slight Transparency
; TintA=180   ; Soft Transparency
; TintA=128   ; 50% Transparent
; TintA=64    ; Very Transparent
; TintA=0     ; Invisible

TintA=255

; =====================================================================
; BRIGHTNESS SETTINGS
; =====================================================================

; Presets:
;
; Brightness=0.25
; Brightness=0.50
; Brightness=0.75
; Brightness=1.00
; Brightness=1.50
; Brightness=2.00

Brightness=1.00

; =====================================================================
; ADVANCED SETTINGS
; =====================================================================
;
; Change only if you know what you're doing.
;
; =====================================================================

Width=(#BaseWidth#*#Scale#)
Height=(#BaseHeight#*#Scale#)

FinalR=(#TintR#*#Brightness#)
FinalG=(#TintG#*#Brightness#)
FinalB=(#TintB#*#Brightness#)

; =====================================================================
; ENGINE (DO NOT EDIT)
; =====================================================================

[MeasureAnimation]
Measure=Script
ScriptFile=#@#Scripts\FrameForge.lua
DynamicVariables=1

[Animation]
Meter=Image

ImageName=#@#Frames\#FramePrefix#[MeasureAnimation].png

X=#PosX#
Y=#PosY#

W=#Width#
H=#Height#

ImageTint=#FinalR#,#FinalG#,#FinalB#,#TintA#

PreserveAspectRatio=1
AntiAlias=1
DynamicVariables=1
